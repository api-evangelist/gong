reconciled: false
tags:
  - FinOps
  - FOCUS
  - Revenue Intelligence
  - SaaS
description: 'FOCUS-aligned FinOps framing for Gong: per-seat subscription plus platform fee scaled by
  user-band tier. Specific rates are sales-led and not publicly posted.'
notes: Reconcile when Gong publishes a public rate card.
sources:
  - https://www.gong.io/pricing/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Gong.io, Inc.
serviceCategory: Revenue Intelligence (SaaS)
billingModel:
  pricingCategory: Per-Seat Subscription + Platform Fee
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Gong
  ServiceCategory: Revenue Intelligence
  ProviderName: Gong
  PublisherName: Gong.io, Inc.
  InvoiceIssuerName: Gong.io, Inc.
  BillingCurrency: USD
meters:
  - name: licensed_seats
    description: Active Gong-licensed seats (typically sales reps, sales managers, customer-success)
    unit: seat
    aggregation: max
    dimensions:
      - role
      - team
      - product_module
  - name: platform_fee
    description: Annual platform fee scaled by user-band tier
    unit: year
    aggregation: sum
  - name: calls_recorded
    description: Calls recorded and transcribed (capacity-shaping, not direct billing)
    unit: call
    aggregation: sum
  - name: api_requests
    description: API request volume against tenant quota
    unit: request
    aggregation: sum
principles:
  - name: Visibility
    description: Use the Gong Admin API and console to track licensed-seat utilization and per-team adoption;
      reconcile annual invoice against active seats.
  - name: Allocation
    description: Allocate seat cost to the owning sales / customer-success team; platform fee to revenue
      operations.
  - name: Optimization
    description: Reclaim dormant seats quarterly; right-size product-module mix (Capture vs Engage vs
      Forecast); avoid over-provisioning ahead of hiring plans.
  - name: Accountability
    description: Revenue Operations owns Gong spend and renewal; sales managers own per-team seat hygiene.
maintainers:
