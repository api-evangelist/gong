naftiko: 1.0.0-alpha2
info:
  label: Gong Settings API — Scorecards
  description: 'Gong Settings API — Scorecards. 1 operations. Lead operation: Gong Retrieve scorecards. Self-contained Naftiko
    capability covering one Gong business surface.'
  tags:
  - Gong
  - Scorecards
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GONG_API_KEY: GONG_API_KEY
capability:
  consumes:
  - type: http
    namespace: settings-scorecards
    baseUri: https://api.gong.io/v2
    description: Gong Settings API — Scorecards business capability. Self-contained, no shared references.
    resources:
    - name: settings-scorecards
      path: /settings/scorecards
      operations:
      - name: listscorecards
        method: GET
        description: Gong Retrieve scorecards
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.GONG_API_KEY}}'
  exposes:
  - type: rest
    namespace: settings-scorecards-rest
    port: 8080
    description: REST adapter for Gong Settings API — Scorecards. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/settings/scorecards
      name: settings-scorecards
      description: REST surface for settings-scorecards.
      operations:
      - method: GET
        name: listscorecards
        description: Gong Retrieve scorecards
        call: settings-scorecards.listscorecards
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: settings-scorecards-mcp
    port: 9090
    transport: http
    description: MCP adapter for Gong Settings API — Scorecards. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: gong-retrieve-scorecards
      description: Gong Retrieve scorecards
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: settings-scorecards.listscorecards
      outputParameters:
      - type: object
        mapping: $.
