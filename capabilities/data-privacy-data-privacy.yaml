      description: Gong Retrieve email address references
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-privacy-data-privacy.retrieveemailreferences
      with:
        emailAddress: tools.emailAddress
      outputParameters:
      - type: object
