naftiko: 1.0.0-alpha2
info:
  label: Gong Engage API — Folders
  description: 'Gong Engage API — Folders. 1 operations. Lead operation: Gong List flow folders. Self-contained Naftiko capability
    covering one Gong business surface.'
  tags:
  - Gong
  - Folders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GONG_API_KEY: GONG_API_KEY
capability:
  consumes:
  - type: http
    namespace: engage-folders
    baseUri: https://api.gong.io/v2
    description: Gong Engage API — Folders business capability. Self-contained, no shared references.
    resources:
    - name: flows-folders
      path: /flows/folders
      operations:
      - name: listflowfolders
        method: GET
        description: Gong List flow folders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userEmail
          in: query
          type: string
          description: Email of the user to include personal and shared folders for.
        - name: workspaceId
          in: query
          type: string
          description: Filter folders by workspace ID.
    authentication:
      type: bearer
      token: '{{env.GONG_API_KEY}}'
  exposes:
  - type: rest
    namespace: engage-folders-rest
    port: 8080
    description: REST adapter for Gong Engage API — Folders. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/flows/folders
      name: flows-folders
      description: REST surface for flows-folders.
      operations:
      - method: GET
        name: listflowfolders
        description: Gong List flow folders
        call: engage-folders.listflowfolders
        with:
          userEmail: rest.userEmail
          workspaceId: rest.workspaceId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: engage-folders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Gong Engage API — Folders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: gong-list-flow-folders
      description: Gong List flow folders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: engage-folders.listflowfolders
      with:
        userEmail: tools.userEmail
        workspaceId: tools.workspaceId
      outputParameters:
      - type: object
        mapping: $.
