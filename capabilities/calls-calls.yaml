naftiko: 1.0.0-alpha2
info:
  label: Gong Calls API — Calls
  description: 'Gong Calls API — Calls. 8 operations. Lead operation: Gong List calls. Self-contained Naftiko capability covering
    one Gong business surface.'
  tags:
  - Gong
  - Calls
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    GONG_API_KEY: GONG_API_KEY
capability:
  consumes:
  - type: http
    namespace: calls-calls
    baseUri: https://api.gong.io/v2
    description: Gong Calls API — Calls business capability. Self-contained, no shared references.
    resources:
    - name: calls
      path: /calls
      operations:
      - name: listcalls
        method: GET
        description: Gong List calls
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fromDateTime
          in: query
          type: string
          description: The start date and time for the calls filter in ISO-8601 format (e.g., 2021-01-01T00:00:00Z).
          required: true
        - name: toDateTime
          in: query
          type: string
          description: The end date and time for the calls filter in ISO-8601 format (e.g., 2021-12-31T23:59:59Z).
          required: true
        - name: cursor
          in: query
          type: string
          description: A cursor for pagination. Pass the cursor from the previous response to retrieve the next page of results.
        - name: workspaceId
          in: query
          type: string
          description: Optional workspace identifier to filter calls by workspace.
      - name: addcall
        method: POST
        description: Gong Add a new call
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: calls-extensive
      path: /calls/extensive
      operations:
      - name: listcallsextensive
        method: POST
        description: Gong Retrieve detailed call data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: calls-manual-crm-associations
      path: /calls/manual-crm-associations
      operations:
      - name: listmanualcrmassociations
        method: GET
        description: Gong List calls manually associated with CRM
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fromDateTime
          in: query
          type: string
          description: Filter by the time the manual association was created, in ISO-8601 format.
        - name: cursor
          in: query
          type: string
          description: A cursor for pagination. Pass the cursor from the previous response to retrieve the next page of results.
    - name: calls-users-access
      path: /calls/users-access
      operations:
      - name: retrieveusercallaccess
        method: POST
        description: Gong Retrieve user call access
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: giveusercallaccess
        method: PUT
        description: Gong Give user call access
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removeusercallaccess
        method: DELETE
        description: Gong Remove user call access
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: calls-id
      path: /calls/{id}
      operations:
      - name: getcall
        method: GET
        description: Gong Retrieve a specific call
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Gong's unique numeric identifier for the call (up to 20 digits).
          required: true
    authentication:
      type: bearer
      token: '{{env.GONG_API_KEY}}'
  exposes:
  - type: rest
    namespace: calls-calls-rest
    port: 8080
    description: REST adapter for Gong Calls API — Calls. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/calls
      name: calls
      description: REST surface for calls.
      operations:
      - method: GET
        name: listcalls
        description: Gong List calls
        call: calls-calls.listcalls
        with:
          fromDateTime: rest.fromDateTime
          toDateTime: rest.toDateTime
          cursor: rest.cursor
          workspaceId: rest.workspaceId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addcall
        description: Gong Add a new call
        call: calls-calls.addcall
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calls/extensive
      name: calls-extensive
      description: REST surface for calls-extensive.
      operations:
      - method: POST
        name: listcallsextensive
        description: Gong Retrieve detailed call data
        call: calls-calls.listcallsextensive
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calls/manual-crm-associations
      name: calls-manual-crm-associations
      description: REST surface for calls-manual-crm-associations.
      operations:
      - method: GET
        name: listmanualcrmassociations
        description: Gong List calls manually associated with CRM
        call: calls-calls.listmanualcrmassociations
        with:
          fromDateTime: rest.fromDateTime
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calls/users-access
      name: calls-users-access
      description: REST surface for calls-users-access.
      operations:
      - method: POST
        name: retrieveusercallaccess
        description: Gong Retrieve user call access
        call: calls-calls.retrieveusercallaccess
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: giveusercallaccess
        description: Gong Give user call access
        call: calls-calls.giveusercallaccess
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removeusercallaccess
        description: Gong Remove user call access
        call: calls-calls.removeusercallaccess
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/calls/{id}
      name: calls-id
      description: REST surface for calls-id.
      operations:
      - method: GET
        name: getcall
        description: Gong Retrieve a specific call
        call: calls-calls.getcall
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: calls-calls-mcp
    port: 9090
    transport: http
    description: MCP adapter for Gong Calls API — Calls. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: gong-list-calls
      description: Gong List calls
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: calls-calls.listcalls
      with:
        fromDateTime: tools.fromDateTime
        toDateTime: tools.toDateTime
        cursor: tools.cursor
        workspaceId: tools.workspaceId
      outputParameters:
      - type: object
        mapping: $.
    - name: gong-add-new-call
      description: Gong Add a new call
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: calls-calls.addcall
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: gong-retrieve-detailed-call-data
      description: Gong Retrieve detailed call data
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: calls-calls.listcallsextensive
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: gong-list-calls-manually-associated
      description: Gong List calls manually associated with CRM
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: calls-calls.listmanualcrmassociations
      with:
        fromDateTime: tools.fromDateTime
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: gong-retrieve-user-call-access
      description: Gong Retrieve user call access
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: calls-calls.retrieveusercallaccess
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: gong-give-user-call-access
      description: Gong Give user call access
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: calls-calls.giveusercallaccess
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: gong-remove-user-call-access
      description: Gong Remove user call access
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: calls-calls.removeusercallaccess
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: gong-retrieve-specific-call
      description: Gong Retrieve a specific call
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: calls-calls.getcall
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
