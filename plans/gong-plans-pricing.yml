specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Gong
providerId: gong
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Revenue Intelligence
  - Conversation Intelligence
  - Sales
  - SaaS
description: Gong does not publish its per-seat or platform pricing. Quoting is sales-led and depends
  on team size (with band tiers for 1-50, 51-1,000, 1,001-9,999, and 10,000+ users) and product mix (Gong
  Capture, Gong Engage, Gong Forecast). Per-user license plus a platform fee scaled by user band; integrations
  with the existing tech stack are included.
notes: Reconcile when Gong publishes a public rate card.
sources:
  - https://www.gong.io/pricing/
plans:
  - id: gong-platform
    name: Gong Revenue Platform
    type: subscription
    description: Per-user subscription plus a platform fee scaled to team size. Custom-quoted.
    entries:
      - label: Per-user license
        name: license_seat
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: Platform fee
        name: platform_fee
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: scales with user band
        userMultiplied: false
    elements:
      - name: Gong Capture (call recording / transcription)
      - name: Gong Engage
      - name: Gong Forecast
      - name: Public API access
      - name: Free integrations with existing stack (CRM, email, dialer)
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
